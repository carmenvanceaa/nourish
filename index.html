<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nourish</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nourish" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ede6;
      --text2: #888882;
      --text3: #555550;
      --accent: #c8f060;
      --accent-dim: rgba(200,240,96,0.12);
      --accent-text: #0e0e0e;
      --red: #ff5c5c;
      --red-dim: rgba(255,92,92,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

    /* ── top bar ── */
    .topbar { padding: calc(var(--safe-top) + 14px) 20px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-title { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.02em; color: var(--text); }
    .topbar-date { font-size: 13px; color: var(--text2); }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); transition: background 0.15s, color 0.15s; }
    .icon-btn:hover, .icon-btn:active { background: var(--surface2); color: var(--text); }

    /* ── scrollable content ── */
    .content { flex: 1; overflow-y: auto; padding: 0 16px 120px; -webkit-overflow-scrolling: touch; }

    /* ── macro ring summary ── */
    .summary-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 20px; }
    .ring-wrap { position: relative; flex-shrink: 0; width: 88px; height: 88px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-cal { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); line-height: 1; }
    .ring-label { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
    .macro-list { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .macro-row { display: flex; align-items: center; gap: 8px; }
    .macro-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .macro-name { font-size: 12px; color: var(--text2); flex: 1; }
    .macro-val { font-size: 14px; font-weight: 500; color: var(--text); }
    .macro-unit { font-size: 11px; color: var(--text3); }

    /* ── water ── */
    .water-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 14px; }
    .water-icon { font-size: 22px; }
    .water-info { flex: 1; }
    .water-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .water-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .water-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .water-fill { height: 100%; background: #60c8f0; border-radius: 2px; transition: width 0.3s ease; }
    .water-controls { display: flex; align-items: center; gap: 10px; }
    .w-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border2); background: transparent; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .w-btn:active { background: var(--surface2); }
    .w-count { font-size: 16px; font-weight: 500; min-width: 20px; text-align: center; }

    /* ── meal sections ── */
    .meal-section { margin-bottom: 6px; }
    .meal-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px 8px; }
    .meal-name { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
    .meal-cal { font-size: 12px; color: var(--text3); }
    .entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .entry-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .entry-portion { font-size: 12px; color: var(--text2); }
    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-cal { font-size: 15px; font-weight: 500; color: var(--text); }
    .entry-macros { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .entry-del { font-size: 11px; color: var(--red); cursor: pointer; margin-top: 5px; display: block; opacity: 0.7; }
    .entry-del:hover { opacity: 1; }
    .empty-state { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; }

    /* ── bottom bar ── */
    .bottombar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: linear-gradient(to top, var(--bg) 70%, transparent); padding: calc(12px) 20px calc(var(--safe-bottom) + 20px); z-index: 100; }
    .input-row { display: flex; gap: 10px; align-items: center; background: var(--surface); border: 1px solid var(--border2); border-radius: 999px; padding: 8px 8px 8px 18px; }
    .text-input { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); }
    .text-input::placeholder { color: var(--text3); }
    .meal-pill { font-size: 11px; font-weight: 500; background: var(--surface2); color: var(--text2); border-radius: 20px; padding: 4px 10px; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); flex-shrink: 0; }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { color: var(--accent-text); }
    .mic-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .mic-btn.recording { background: var(--red-dim); border-color: var(--red); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,92,92,0.3); } 50% { box-shadow: 0 0 0 8px rgba(255,92,92,0); } }

    /* ── meal picker sheet ── */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .sheet-overlay.open { display: flex; }
    .sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 16px 16px calc(var(--safe-bottom) + 24px); }
    .sheet-title { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 14px; }
    .sheet-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sheet-opt { padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); font-size: 15px; font-weight: 500; color: var(--text); cursor: pointer; text-align: center; transition: background 0.15s; }
    .sheet-opt.active { border-color: var(--accent); color: var(--accent); }
    .sheet-opt:active { background: var(--bg); }

    /* ── settings overlay ── */
    .settings-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; }
    .settings-overlay.open { display: flex; }
    .settings-header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .settings-back { cursor: pointer; color: var(--text2); display: flex; }
    .settings-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .settings-body { flex: 1; overflow-y: auto; padding: 24px 20px; }
    .settings-section { margin-bottom: 28px; }
    .settings-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .settings-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
    .settings-row label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
    .settings-row input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; }
    .settings-row input:focus { border-color: var(--accent); }
    .settings-save-btn { width: 100%; padding: 14px; background: var(--accent); color: var(--accent-text); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .settings-save-btn:active { opacity: 0.85; }
    .export-btn { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.15s; }
    .export-btn:active { background: var(--surface2); }
    .status-msg { font-size: 13px; margin-top: 10px; text-align: center; }
    .status-msg.ok { color: var(--accent); }
    .status-msg.err { color: var(--red); }

    /* ── scan overlay ── */
    .scan-overlay { position: fixed; inset: 0; background: #000; z-index: 300; display: none; flex-direction: column; align-items: center; }
    .scan-overlay.open { display: flex; }
    .scan-video { width: 100%; height: 100%; object-fit: cover; }
    .scan-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .scan-frame { width: 260px; height: 140px; border: 2px solid var(--accent); border-radius: 12px; position: relative; }
    .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--accent); top: 50%; animation: scanline 2s ease-in-out infinite; }
    @keyframes scanline { 0%,100% { top: 10%; } 50% { top: 90%; } }
    .scan-hint { color: #fff; font-size: 14px; margin-top: 24px; opacity: 0.8; }
    .scan-close { position: absolute; top: calc(var(--safe-top) + 16px); right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .scan-status { position: absolute; bottom: calc(var(--safe-bottom) + 40px); font-size: 14px; color: #fff; background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; }

    /* ── history overlay ── */
    .history-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; }
    .history-overlay.open { display: flex; }
    .history-header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .history-back { cursor: pointer; color: var(--text2); display: flex; }
    .history-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .history-body { flex: 1; overflow-y: auto; padding: 16px; }
    .history-day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; cursor: pointer; }
    .history-day-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .history-day-date { font-size: 15px; font-weight: 500; color: var(--text); }
    .history-day-meta { font-size: 13px; color: var(--text2); }
    .history-day-cal { font-size: 15px; font-weight: 500; color: var(--accent); }
    .history-day-entries { border-top: 1px solid var(--border); padding: 10px 16px; display: none; }
    .history-day.expanded .history-day-entries { display: block; }
    .history-day.expanded .history-chevron { transform: rotate(180deg); }
    .history-chevron { transition: transform 0.2s; color: var(--text3); }
    .history-entry-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .history-entry-row:last-child { border-bottom: none; }
    .history-entry-name { font-size: 13px; color: var(--text); }
    .history-entry-meal { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .history-entry-cal { font-size: 13px; color: var(--text2); }
    .history-macros { display: flex; gap: 12px; padding: 10px 0 4px; border-top: 1px solid var(--border); margin-top: 6px; }
    .history-macro { font-size: 12px; color: var(--text2); }
    .history-macro span { color: var(--text); font-weight: 500; }
    .history-empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
    .history-add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 10px; padding: 10px; border-radius: var(--radius-sm); border: 1px dashed var(--border2); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .history-add-btn:active { background: var(--surface2); color: var(--text); }
    .history-del { font-size: 11px; color: var(--red); cursor: pointer; opacity: 0.7; padding: 2px 0 2px 10px; flex-shrink: 0; }
    .history-del:hover { opacity: 1; }

    /* ── past day log overlay ── */
    .pastlog-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: none; flex-direction: column; }
    .pastlog-overlay.open { display: flex; }
    .pastlog-header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .pastlog-back { cursor: pointer; color: var(--text2); display: flex; }
    .pastlog-title { flex: 1; }
    .pastlog-title-main { font-family: 'DM Serif Display', serif; font-size: 20px; }
    .pastlog-title-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .pastlog-body { flex: 1; overflow-y: auto; padding: 16px; }
    .pastlog-input-area { flex-shrink: 0; padding: 12px 16px calc(var(--safe-bottom) + 16px); border-top: 1px solid var(--border); background: var(--bg); }
    .pastlog-meal-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .pastlog-meal-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .pastlog-meal-btn.active { border-color: var(--accent); color: var(--accent); }
    .pastlog-row { display: flex; gap: 8px; align-items: center; }
    .pastlog-input { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 999px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; }
    .pastlog-input::placeholder { color: var(--text3); }
    .pastlog-send { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .pastlog-status { font-size: 12px; color: var(--text2); text-align: center; margin-top: 8px; min-height: 18px; }

    /* ── budget bar (feature 1 & 2) ── */
    .budget-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 18px; margin-bottom: 14px; }
    .budget-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .budget-remaining { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); line-height: 1; }
    .budget-remaining.danger { color: var(--red); }
    .budget-remaining.warning { color: #f0c060; }
    .budget-label { font-size: 12px; color: var(--text2); }
    .budget-consumed { font-size: 13px; color: var(--text2); }
    .budget-bar-wrap { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease, background 0.3s; }
    .budget-bar-fill.warning { background: #f0c060; }
    .budget-bar-fill.danger { background: var(--red); }
    .budget-macros { display: flex; gap: 0; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .budget-macro { flex: 1; text-align: center; }
    .budget-macro + .budget-macro { border-left: 1px solid var(--border); }
    .budget-macro-val { font-size: 15px; font-weight: 500; color: var(--text); }
    .budget-macro-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .budget-macro-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin: 6px 12px 0; overflow: hidden; }
    .budget-macro-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    /* ── streak card (feature 5) ── */
    .streak-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .streak-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; }
    .streak-icon { font-size: 24px; line-height: 1; }
    .streak-num { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); line-height: 1; }
    .streak-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ── weekly chart overlay (feature 4) ── */
    .weekly-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; }
    .weekly-overlay.open { display: flex; }
    .weekly-header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .weekly-back { cursor: pointer; color: var(--text2); display: flex; }
    .weekly-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .weekly-body { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .weekly-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; margin-bottom: 8px; }
    .weekly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .weekly-bar-col { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; }
    .weekly-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; position: relative; }
    .weekly-bar.today { background: var(--accent); }
    .weekly-bar.over { background: var(--red); }
    .weekly-bar.good { background: #60c8f0; }
    .weekly-bar.empty { background: var(--surface2); }
    .weekly-bar-cal { font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 4px; }
    .weekly-day-label { font-size: 11px; color: var(--text2); margin-top: 6px; }
    .weekly-goal-line { border-top: 1px dashed var(--border2); margin: 0 0 16px; position: relative; }
    .weekly-goal-line span { position: absolute; right: 0; top: -9px; font-size: 10px; color: var(--text3); background: var(--bg); padding-left: 4px; }
    .weekly-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .weekly-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .weekly-stat-val { font-size: 22px; font-weight: 500; color: var(--text); }
    .weekly-stat-label { font-size: 12px; color: var(--text2); margin-top: 3px; }

    /* ── loading ── */
    .parsing-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: shimmer 1.2s infinite; display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 999; }
    .parsing-bar.show { display: block; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    /* scrollbar */
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div class="parsing-bar" id="parsing-bar"></div>

<div class="app">
  <!-- top bar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">Nourish</div>
      <div class="topbar-date" id="today-date"></div>
    </div>
    <div class="topbar-actions">
      <div class="icon-btn" onclick="openHistory()" title="History">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
// ── state ──
let apiKey = localStorage.getItem('nourish_key') || '';
let goalCal = parseInt(localStorage.getItem('nourish_goal_cal') || '2000');
let goalWater = parseInt(localStorage.getItem('nourish_goal_water') || '8');
let goalProtein = parseInt(localStorage.getItem('nourish_goal_protein') || '120');
let currentMeal = 'Breakfast';
let waterCount = 0;
let entries = [];
let recognition = null;
let isRecording = false;
let scanReader = null;
let scanStream = null;
let pastLogDate = null;
let pastLogMeal = 'Breakfast';

const MEALS = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

// ── init ──
document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
if (apiKey) document.getElementById('settings-key').value = apiKey;
document.getElementById('goal-cal').value = goalCal;
document.getElementById('goal-water').value = goalWater;
document.getElementById('goal-protein').value = goalProtein;
loadDay();
renderAll();
renderStreak();
renderWeeklyAvg();

// ── persistence ──
function todayKey() { return 'nourish_' + new Date().toISOString().slice(0,10); }

function loadDay() {
  const saved = localStorage.getItem(todayKey());
  if (saved) {
    const d = JSON.parse(saved);
    entries = d.entries || [];
    waterCount = d.water || 0;
  }
}

function saveDay() {
  localStorage.setItem(todayKey(), JSON.stringify({ entries, water: waterCount }));
}

// ── render ──
function renderAll() {
  renderSummary();
  renderWater();
  renderLog();
}

function renderSummary() {
  const totals = entries.reduce((a, e) => ({
    cal: a.cal + (e.calories||0),
    protein: a.protein + (e.protein||0),
    carbs: a.carbs + (e.carbs||0),
    fat: a.fat + (e.fat||0)
  }), {cal:0,protein:0,carbs:0,fat:0});

  const cal = Math.round(totals.cal);
  const remaining = goalCal - cal;
  const pct = Math.min(cal / goalCal * 100, 100);

  // budget remaining
  const remEl = document.getElementById('budget-remaining');
  remEl.textContent = Math.abs(remaining);
  remEl.className = 'budget-remaining' + (remaining < 0 ? ' danger' : remaining < goalCal * 0.1 ? ' warning' : '');
  document.getElementById('budget-label') && (document.getElementById('budget-label').textContent = remaining < 0 ? 'kcal over budget' : 'kcal remaining today');
  document.querySelector('.budget-label').textContent = remaining < 0 ? 'kcal over budget' : 'kcal remaining today';
  document.getElementById('total-cal').textContent = cal;
  document.getElementById('budget-goal-label').textContent = `of ${goalCal} goal`;

  // budget bar
  const bar = document.getElementById('budget-bar');
  bar.style.width = pct.toFixed(1) + '%';
  bar.className = 'budget-bar-fill' + (pct >= 100 ? ' danger' : pct >= 90 ? ' warning' : '');

  // macros
  document.getElementById('total-protein').textContent = Math.round(totals.protein);
  document.getElementById('total-carbs').textContent = Math.round(totals.carbs);
  document.getElementById('total-fat').textContent = Math.round(totals.fat);

  // protein bar vs goal (feature 3)
  const proteinPct = Math.min(totals.protein / goalProtein * 100, 100);
  document.getElementById('bar-protein').style.width = proteinPct.toFixed(1) + '%';
  document.getElementById('goal-protein-label').textContent = `/ ${goalProtein}g`;

  // carbs & fat bars — relative to cal-implied targets
  const carbTarget = Math.round(goalCal * 0.4 / 4);
  const fatTarget = Math.round(goalCal * 0.3 / 9);
  document.getElementById('bar-carbs').style.width = Math.min(totals.carbs / carbTarget * 100, 100).toFixed(1) + '%';
  document.getElementById('bar-fat').style.width = Math.min(totals.fat / fatTarget * 100, 100).toFixed(1) + '%';
}

function renderWater() {
  document.getElementById('water-count').textContent = waterCount;
  document.getElementById('water-sub').textContent = `${waterCount} of ${goalWater} glasses`;
  document.getElementById('water-fill').style.width = Math.min(waterCount/goalWater*100,100).toFixed(0) + '%';
}

function renderLog() {
  const container = document.getElementById('log-container');
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state">No entries yet — tap the mic or type below</div>';
    return;
  }
  let html = '';
  MEALS.forEach(meal => {
    const me = entries.filter(e => e.meal === meal);
    if (!me.length) return;
    const mealCal = me.reduce((a,e) => a+(e.calories||0), 0);
    html += `<div class="meal-section">
      <div class="meal-header">
        <span class="meal-name">${meal}</span>
        <span class="meal-cal">${Math.round(mealCal)} kcal</span>
      </div>`;
    me.forEach(e => {
      html += `<div class="entry-card">
        <div class="entry-left">
          <div class="entry-name">${e.name}</div>
          <div class="entry-portion">${e.portion||''}</div>
        </div>
        <div class="entry-right">
          <div class="entry-cal">${Math.round(e.calories||0)} kcal</div>
          <div class="entry-macros">P ${Math.round(e.protein||0)}g · C ${Math.round(e.carbs||0)}g · F ${Math.round(e.fat||0)}g</div>
          <span class="entry-del" onclick="deleteEntry(${e.id})">remove</span>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

// ── meal picker ──
function openMealPicker() {
  document.getElementById('meal-sheet').classList.add('open');
}
function closeMealPicker(e) {
  if (e.target === document.getElementById('meal-sheet')) {
    document.getElementById('meal-sheet').classList.remove('open');
  }
}
function selectMeal(meal) {
  currentMeal = meal;
  document.getElementById('meal-pill').textContent = meal + ' ▾';
  document.querySelectorAll('.sheet-opt').forEach(o => {
    o.classList.toggle('active', o.textContent === meal);
  });
  document.getElementById('meal-sheet').classList.remove('open');
}

// ── settings ──
function openSettings() { document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
function saveSettings() {
  const key = document.getElementById('settings-key').value.trim();
  if (key && !key.startsWith('sk-ant-')) {
    showSettingsStatus('Key should start with sk-ant-', false);
    return;
  }
  if (key) { apiKey = key; localStorage.setItem('nourish_key', key); }
  goalCal = parseInt(document.getElementById('goal-cal').value) || 2000;
  goalWater = parseInt(document.getElementById('goal-water').value) || 8;
  goalProtein = parseInt(document.getElementById('goal-protein').value) || 120;
  localStorage.setItem('nourish_goal_cal', goalCal);
  localStorage.setItem('nourish_goal_water', goalWater);
  localStorage.setItem('nourish_goal_protein', goalProtein);
  showSettingsStatus('Saved!', true);
  renderAll();
  renderStreak();
  renderWeeklyAvg();
}
function showSettingsStatus(msg, ok) {
  const el = document.getElementById('settings-status');
  el.textContent = msg;
  el.className = 'status-msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.textContent = '', 3000);
}

// ── voice ──
function toggleMic() {
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice not supported in this browser. Use the text input.');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  let finalText = '';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('text-input').value = finalText + interim;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    const text = document.getElementById('text-input').value.trim();
    if (text) analyzeFood(text);
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
  };
  recognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
}

function stopMic() {
  if (recognition) recognition.stop();
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

// ── text submit ──
function submitText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  analyzeFood(text);
}

// ── AI food parsing ──
async function analyzeFood(text) {
  if (!apiKey) {
    openSettings();
    document.getElementById('settings-status').textContent = 'Enter your API key first';
    document.getElementById('settings-status').className = 'status-msg err';
    return;
  }
  showLoading(true);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `You are a nutrition expert. Parse this food description and return ONLY a valid JSON object with no markdown, no backticks, no explanation:
{"name":"concise food name","portion":"serving description","calories":number,"protein":number,"carbs":number,"fat":number}
All numbers must be integers. Estimate realistic values for the described portion.
Food: "${text}"`
        }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content[0].text.trim().replace(/```[a-z]*|```/g,'').trim();
    const parsed = JSON.parse(raw);
    addEntry(parsed);
  } catch(e) {
    alert('Could not analyze food. Check your API key in Settings.');
  }
  showLoading(false);
}

function addEntry(food) {
  entries.push({ ...food, meal: currentMeal, id: Date.now() });
  saveDay();
  renderAll();
  // scroll to bottom of log
  setTimeout(() => {
    const c = document.getElementById('content');
    c.scrollTop = c.scrollHeight;
  }, 100);
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveDay();
  renderAll();
}

// ── water ──
function adjustWater(delta) {
  waterCount = Math.max(0, Math.min(20, waterCount + delta));
  saveDay();
  renderWater();
}

// ── loading ──
function showLoading(show) {
  document.getElementById('parsing-bar').classList.toggle('show', show);
}

// ── barcode scan ──
async function openScan() {
  if (!window.ZXing) { alert('Barcode library not loaded yet, try again.'); return; }
  document.getElementById('scan-overlay').classList.add('open');
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('scan-video');
    video.srcObject = scanStream;
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    scanReader = new ZXing.BrowserMultiFormatReader(hints);
    scanReader.decodeFromVideoDevice(null, 'scan-video', (result, err) => {
      if (result) {
        const barcode = result.getText();
        closeScan();
        lookupBarcode(barcode);
      }
    });
  } catch(e) {
    document.getElementById('scan-status').textContent = 'Camera access denied';
  }
}

function closeScan() {
  document.getElementById('scan-overlay').classList.remove('open');
  if (scanReader) { scanReader.reset(); scanReader = null; }
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  document.getElementById('scan-status').textContent = 'Scanning...';
}

async function lookupBarcode(barcode) {
  showLoading(true);
  document.getElementById('scan-status').textContent = 'Looking up ' + barcode + '...';
  try {
    const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const data = await resp.json();
    if (data.status !== 1 || !data.product) throw new Error('Not found');
    const p = data.product;
    const n = p.nutriments || {};
    const name = p.product_name || p.generic_name || 'Unknown product';
    const serving = p.serving_size || '100g';
    const mult = parseServingMultiplier(serving);
    addEntry({
      name,
      portion: serving,
      calories: Math.round((n['energy-kcal_100g']||0) * mult),
      protein: Math.round((n.proteins_100g||0) * mult),
      carbs: Math.round((n.carbohydrates_100g||0) * mult),
      fat: Math.round((n.fat_100g||0) * mult)
    });
  } catch(e) {
    // fallback: ask AI with just the barcode
    await analyzeFood('Product with barcode ' + barcode + ', estimate average values for a typical packaged food serving');
  }
  showLoading(false);
}

function parseServingMultiplier(servingStr) {
  const match = servingStr.match(/(\d+\.?\d*)/);
  if (!match) return 1;
  const grams = parseFloat(match[1]);
  return grams / 100;
}

// ── export / import ──
function getAllDayKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('nourish_2')) keys.push(k);
  }
  return keys.sort();
}

function getFilteredKeys() {
  const from = document.getElementById('export-from').value;
  const to = document.getElementById('export-to').value;
  return getAllDayKeys().filter(k => {
    const d = k.replace('nourish_', '');
    if (from && d < from) return false;
    if (to && d > to) return false;
    return true;
  });
}

function exportJSON() {
  const keys = getFilteredKeys();
  if (!keys.length) { showExportStatus('No data in selected range', false); return; }
  const backup = {};
  keys.forEach(k => {
    backup[k.replace('nourish_', '')] = JSON.parse(localStorage.getItem(k) || '{}');
  });
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `nourish-backup-${today()}.json`);
  showExportStatus(`Exported ${keys.length} day${keys.length !== 1 ? 's' : ''}`, true);
}

function exportCSV() {
  const keys = getFilteredKeys();
  if (!keys.length) { showExportStatus('No data in selected range', false); return; }
  const rows = [['Date', 'Meal', 'Food', 'Portion', 'Calories', 'Protein (g)', 'Carbs (g)', 'Fat (g)', 'Water (glasses)']];
  keys.forEach(k => {
    const date = k.replace('nourish_', '');
    const d = JSON.parse(localStorage.getItem(k) || '{}');
    const dayEntries = d.entries || [];
    const water = d.water || 0;
    if (dayEntries.length === 0) {
      rows.push([date, '', '', '', '', '', '', '', water]);
    } else {
      dayEntries.forEach((e, i) => {
        rows.push([
          date, e.meal || '', e.name || '', e.portion || '',
          e.calories || 0, e.protein || 0, e.carbs || 0, e.fat || 0,
          i === 0 ? water : ''
        ]);
      });
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  downloadBlob(blob, `nourish-backup-${today()}.csv`);
  showExportStatus(`Exported ${keys.length} day${keys.length !== 1 ? 's' : ''}`, true);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      let count = 0;
      Object.entries(backup).forEach(([date, data]) => {
        if (/^\d{4}-\d{2}-\d{2}$/.test(date) && data && typeof data === 'object') {
          localStorage.setItem('nourish_' + date, JSON.stringify(data));
          count++;
        }
      });
      showExportStatus(`Imported ${count} day${count !== 1 ? 's' : ''} successfully`, true);
      loadDay();
      renderAll();
    } catch {
      showExportStatus('Invalid backup file', false);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function showExportStatus(msg, ok) {
  const el = document.getElementById('export-status');
  el.textContent = msg;
  el.className = 'status-msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.textContent = '', 4000);
}

// ── history ──
function openHistory() {
  renderHistory();
  document.getElementById('history-overlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('history-overlay').classList.remove('open');
}

function renderHistory() {
  const body = document.getElementById('history-body');
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('nourish_2')) keys.push(k);
  }
  keys.sort().reverse();

  if (keys.length === 0) {
    body.innerHTML = '<div class="history-empty">No past days yet — start logging today!</div>';
    return;
  }

  // also show last 7 days even if empty so user can backfill
  const shown = new Set(keys.map(k => k.replace('nourish_','')));
  for (let i = 1; i <= 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    if (!shown.has(ds)) { shown.add(ds); keys.push('nourish_' + ds); }
  }
  keys.sort().reverse();

  let html = '';
  keys.forEach(key => {
    const dateStr = key.replace('nourish_', '');
    const isToday = dateStr === new Date().toISOString().slice(0,10);
    if (isToday) return; // today is shown on main screen
    const d = JSON.parse(localStorage.getItem(key) || '{}');
    const dayEntries = d.entries || [];
    const water = d.water || 0;

    const totals = dayEntries.reduce((a, e) => ({
      cal: a.cal + (e.calories||0),
      protein: a.protein + (e.protein||0),
      carbs: a.carbs + (e.carbs||0),
      fat: a.fat + (e.fat||0)
    }), {cal:0,protein:0,carbs:0,fat:0});

    const date = new Date(dateStr + 'T12:00:00');
    const label = isToday ? 'Today' : date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    html += `<div class="history-day" id="hday-${dateStr}" onclick="toggleHistoryDay('${dateStr}')">
      <div class="history-day-header">
        <div>
          <div class="history-day-date">${label}</div>
          <div class="history-day-meta">${dayEntries.length ? `${dayEntries.length} item${dayEntries.length !== 1 ? 's' : ''} · 💧 ${water}` : 'No entries'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="history-day-cal">${dayEntries.length ? Math.round(totals.cal) + ' kcal' : ''}</div>
          <svg class="history-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="history-day-entries">`;

    dayEntries.forEach(e => {
      html += `<div class="history-entry-row">
        <div style="flex:1;">
          <div class="history-entry-name">${e.name}</div>
          <div class="history-entry-meal">${e.meal} · ${e.portion||''}</div>
        </div>
        <div class="history-entry-cal">${Math.round(e.calories||0)} kcal</div>
        <span class="history-del" onclick="deleteHistoryEntry('${dateStr}',${e.id},event)">✕</span>
      </div>`;
    });

    html += `<div class="history-macros">
      <div class="history-macro">P <span>${Math.round(totals.protein)}g</span></div>
      <div class="history-macro">C <span>${Math.round(totals.carbs)}g</span></div>
      <div class="history-macro">F <span>${Math.round(totals.fat)}g</span></div>
    </div>
    <button class="history-add-btn" onclick="openPastLog('${dateStr}',event)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add entry
    </button>
    </div></div>`;
  });

  body.innerHTML = html || '<div class="history-empty">No past days logged yet</div>';
}

function toggleHistoryDay(dateStr) {
  const el = document.getElementById('hday-' + dateStr);
  if (el) el.classList.toggle('expanded');
}

function deleteHistoryEntry(dateStr, id, event) {
  event.stopPropagation();
  const key = 'nourish_' + dateStr;
  const d = JSON.parse(localStorage.getItem(key) || '{}');
  d.entries = (d.entries || []).filter(e => e.id !== id);
  localStorage.setItem(key, JSON.stringify(d));
  // refresh today if needed
  if (dateStr === new Date().toISOString().slice(0,10)) { loadDay(); renderAll(); }
  renderHistory();
}

function openPastLog(dateStr, event) {
  event.stopPropagation();
  pastLogDate = dateStr;
  pastLogMeal = 'Breakfast';
  const date = new Date(dateStr + 'T12:00:00');
  document.getElementById('pastlog-title-main').textContent = 'Add to ' + date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('pastlog-title-sub').textContent = 'Entries will be saved to this day';
  document.getElementById('pastlog-input').value = '';
  document.getElementById('pastlog-status').textContent = '';
  document.querySelectorAll('.pastlog-meal-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  renderPastLogEntries();
  document.getElementById('pastlog-overlay').classList.add('open');
  setTimeout(() => document.getElementById('pastlog-input').focus(), 300);
}

function closePastLog() {
  document.getElementById('pastlog-overlay').classList.remove('open');
  renderHistory();
}

function selectPastMeal(meal, btn) {
  pastLogMeal = meal;
  document.querySelectorAll('.pastlog-meal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function renderPastLogEntries() {
  const key = 'nourish_' + pastLogDate;
  const d = JSON.parse(localStorage.getItem(key) || '{}');
  const dayEntries = d.entries || [];
  const body = document.getElementById('pastlog-body');
  if (dayEntries.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:32px 20px;color:var(--text3);font-size:14px;">No entries yet for this day</div>';
    return;
  }
  const MEALS = ['Breakfast','Lunch','Dinner','Snack'];
  let html = '';
  MEALS.forEach(meal => {
    const me = dayEntries.filter(e => e.meal === meal);
    if (!me.length) return;
    html += `<div style="font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);margin:12px 0 6px;">${meal}</div>`;
    me.forEach(e => {
      html += `<div class="entry-card">
        <div class="entry-left">
          <div class="entry-name">${e.name}</div>
          <div class="entry-portion">${e.portion||''}</div>
        </div>
        <div class="entry-right">
          <div class="entry-cal">${Math.round(e.calories||0)} kcal</div>
          <div class="entry-macros">P ${Math.round(e.protein||0)}g · C ${Math.round(e.carbs||0)}g · F ${Math.round(e.fat||0)}g</div>
          <span class="entry-del" onclick="deletePastEntry(${e.id})">remove</span>
        </div>
      </div>`;
    });
  });
  body.innerHTML = html;
}

function deletePastEntry(id) {
  const key = 'nourish_' + pastLogDate;
  const d = JSON.parse(localStorage.getItem(key) || '{}');
  d.entries = (d.entries || []).filter(e => e.id !== id);
  localStorage.setItem(key, JSON.stringify(d));
  if (pastLogDate === new Date().toISOString().slice(0,10)) { loadDay(); renderAll(); }
  renderPastLogEntries();
}

async function submitPastLog() {
  const input = document.getElementById('pastlog-input');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { document.getElementById('pastlog-status').textContent = 'Enter API key in Settings first'; return; }
  input.value = '';
  document.getElementById('pastlog-status').textContent = 'Analyzing...';
  showLoading(true);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: `You are a nutrition expert. Parse this food description and return ONLY a valid JSON object with no markdown, no backticks, no explanation:
{"name":"concise food name","portion":"serving description","calories":number,"protein":number,"carbs":number,"fat":number}
All numbers must be integers. Estimate realistic values for the described portion.
Food: "${text}"` }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content[0].text.trim().replace(/```[a-z]*|```/g,'').trim();
    const parsed = JSON.parse(raw);
    // save to past day
    const key = 'nourish_' + pastLogDate;
    const d = JSON.parse(localStorage.getItem(key) || '{}');
    if (!d.entries) d.entries = [];
    d.entries.push({ ...parsed, meal: pastLogMeal, id: Date.now() });
    localStorage.setItem(key, JSON.stringify(d));
    // if it's today, also update live state
    if (pastLogDate === new Date().toISOString().slice(0,10)) { loadDay(); renderAll(); }
    document.getElementById('pastlog-status').textContent = `Added: ${parsed.name} (${parsed.calories} kcal)`;
    renderPastLogEntries();
  } catch(e) {
    document.getElementById('pastlog-status').textContent = 'Could not parse — try again';
  }
  showLoading(false);
}

// ── streak (feature 5) ──
function renderStreak() {
  let streak = 0;
  const todayStr = new Date().toISOString().slice(0,10);
  for (let i = 0; i <= 365; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    if (ds === todayStr && i === 0) { streak++; continue; }
    const saved = localStorage.getItem('nourish_' + ds);
    if (!saved) break;
    const data = JSON.parse(saved);
    if (!data.entries || data.entries.length === 0) break;
    streak++;
  }
  document.getElementById('streak-num').textContent = streak;
}

// ── weekly avg (feature 4 teaser on main screen) ──
function renderWeeklyAvg() {
  let total = 0, count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const saved = localStorage.getItem('nourish_' + ds);
    if (saved) {
      const data = JSON.parse(saved);
      const dayCal = (data.entries||[]).reduce((a,e) => a+(e.calories||0), 0);
      if (dayCal > 0) { total += dayCal; count++; }
    }
  }
  document.getElementById('weekly-avg').textContent = count > 0 ? Math.round(total/count) : '—';
}

// ── weekly chart (feature 4) ──
function openWeekly() {
  renderWeeklyChart();
  document.getElementById('weekly-overlay').classList.add('open');
}
function closeWeekly() {
  document.getElementById('weekly-overlay').classList.remove('open');
}

function renderWeeklyChart() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const saved = localStorage.getItem('nourish_' + ds);
    const data = saved ? JSON.parse(saved) : {};
    const cal = (data.entries||[]).reduce((a,e) => a+(e.calories||0), 0);
    const protein = (data.entries||[]).reduce((a,e) => a+(e.protein||0), 0);
    days.push({ ds, cal: Math.round(cal), protein: Math.round(protein), isToday: i===0,
      label: i===0 ? 'Today' : d.toLocaleDateString('en-US',{weekday:'short'}) });
  }

  const maxCal = Math.max(...days.map(d=>d.cal), goalCal, 100);
  const totalCal = days.reduce((a,d)=>a+d.cal,0);
  const daysLogged = days.filter(d=>d.cal>0).length;
  const avgCal = daysLogged ? Math.round(totalCal/daysLogged) : 0;
  const avgProtein = daysLogged ? Math.round(days.reduce((a,d)=>a+d.protein,0)/daysLogged) : 0;
  const deficit = daysLogged ? Math.round((goalCal - avgCal) * 7) : 0;

  const goalPct = (goalCal / maxCal * 100).toFixed(1);

  let barsHtml = days.map(d => {
    const h = d.cal > 0 ? Math.max((d.cal/maxCal*100),2).toFixed(1) : 2;
    const cls = d.cal === 0 ? 'empty' : d.isToday ? 'today' : d.cal > goalCal ? 'over' : 'good';
    const calLabel = d.cal > 0 ? d.cal : '';
    return `<div class="weekly-bar-wrap">
      <div class="weekly-bar-col">
        <div class="weekly-bar-cal">${calLabel}</div>
        <div class="weekly-bar ${cls}" style="height:${h}%"></div>
      </div>
      <div class="weekly-day-label">${d.label}</div>
    </div>`;
  }).join('');

  document.getElementById('weekly-body').innerHTML = `
    <div style="position:relative;margin-bottom:4px;">
      <div class="weekly-chart">${barsHtml}</div>
      <div class="weekly-goal-line" style="bottom:${goalPct}%;position:absolute;left:0;right:0;">
        <span>goal ${goalCal}</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);"><div style="width:10px;height:10px;border-radius:2px;background:#60c8f0"></div>Under goal</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);"><div style="width:10px;height:10px;border-radius:2px;background:var(--accent)"></div>Today</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);"><div style="width:10px;height:10px;border-radius:2px;background:var(--red)"></div>Over goal</div>
    </div>
    <div class="weekly-stats">
      <div class="weekly-stat">
        <div class="weekly-stat-val">${avgCal || '—'}</div>
        <div class="weekly-stat-label">avg kcal / day</div>
      </div>
      <div class="weekly-stat">
        <div class="weekly-stat-val">${daysLogged}/7</div>
        <div class="weekly-stat-label">days logged</div>
      </div>
      <div class="weekly-stat">
        <div class="weekly-stat-val">${avgProtein || '—'}g</div>
        <div class="weekly-stat-label">avg protein / day</div>
      </div>
      <div class="weekly-stat">
        <div class="weekly-stat-val" style="color:${deficit>0?'var(--accent)':'var(--red)'};">${deficit > 0 ? '-' : '+'}${Math.abs(deficit)}</div>
        <div class="weekly-stat-label">weekly ${deficit>0?'deficit':'surplus'} kcal</div>
      </div>
    </div>
    <div style="margin-top:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);line-height:1.6;">
      ${deficit > 3500 ? '🔥 Great week — you\'re on track to lose about ' + (deficit/7700).toFixed(1) + 'kg this week.' :
        deficit > 0 ? '✅ You\'re in a deficit — keep it consistent and the weight will follow.' :
        daysLogged === 0 ? '📝 No data yet this week — start logging to see your progress.' :
        '⚠️ You\'re slightly over your weekly budget. A few smaller meals will get you back on track.'}
    </div>`;
}
